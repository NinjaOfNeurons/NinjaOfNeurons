<svg xmlns="http://www.w3.org/2000/svg" width="620" height="400" viewBox="0 0 620 400">
  <defs>
    <style>
      .text { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; font-size: 15px; fill: #e9d5ff; }
      .hi   { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; font-size: 22px; font-weight: 700; fill: #ffffff; }
      .dot-a { animation: bounce 0.8s ease infinite; }
      .dot-b { animation: bounce 0.8s ease infinite; animation-delay: 0.2s; }
      .dot-c { animation: bounce 0.8s ease infinite; animation-delay: 0.4s; }
      @keyframes bounce { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-3px); } }
    </style>
  </defs>

  <rect width="620" height="400" fill="#0d1117" rx="16"/>
  <text class="hi" x="28" y="44">Hi there.</text>

  <!-- ── TYPING 1 (0s → 3s) ── -->
  <g>
    <animate attributeName="opacity" values="0;1;1;0;0" keyTimes="0;0.000;0.083;0.092;1" dur="36s" repeatCount="indefinite"/>
    <rect x="28" y="58" width="72" height="34" rx="17" fill="#1c1500"/>
    <circle class="dot-a" cx="46" cy="75" r="4" fill="#fbbf24"/>
    <circle class="dot-b" cx="60" cy="75" r="4" fill="#fbbf24"/>
    <circle class="dot-c" cx="74" cy="75" r="4" fill="#fbbf24"/>
  </g>
  <!-- BUBBLE 1: I'm Karanpreet Singh (3s → 33s) -->
  <g>
    <animate attributeName="opacity" values="0;0;1;1;0;0" keyTimes="0;0.083;0.117;0.917;0.944;1" dur="36s" repeatCount="indefinite"/>
    <rect x="28" y="58" width="240" height="38" rx="18" fill="#1c1500"/>
    <text class="text" x="48" y="82">I'm Karanpreet Singh.</text>
  </g>

  <!-- ── TYPING 2 (7s → 10s) ── -->
  <g>
    <animate attributeName="opacity" values="0;0;1;1;0;0" keyTimes="0;0.194;0.194;0.278;0.286;1" dur="36s" repeatCount="indefinite"/>
    <rect x="28" y="108" width="72" height="34" rx="17" fill="#1c1500"/>
    <circle class="dot-a" cx="46" cy="125" r="4" fill="#fbbf24"/>
    <circle class="dot-b" cx="60" cy="125" r="4" fill="#fbbf24"/>
    <circle class="dot-c" cx="74" cy="125" r="4" fill="#fbbf24"/>
  </g>
  <!-- BUBBLE 2: Research background (10s → 33s) -->
  <g>
    <animate attributeName="opacity" values="0;0;1;1;0;0" keyTimes="0;0.278;0.311;0.917;0.944;1" dur="36s" repeatCount="indefinite"/>
    <rect x="28" y="108" width="540" height="56" rx="18" fill="#1c1500"/>
    <text class="text" x="48" y="131">Ex Research Assistant at SMARTH, University of Delhi</text>
    <text class="text" x="48" y="153">CPS Lab — where curiosity met real systems.</text>
  </g>

  <!-- ── TYPING 3 (15s → 18s) ── -->
  <g>
    <animate attributeName="opacity" values="0;0;1;1;0;0" keyTimes="0;0.417;0.417;0.500;0.508;1" dur="36s" repeatCount="indefinite"/>
    <rect x="28" y="176" width="72" height="34" rx="17" fill="#1c1500"/>
    <circle class="dot-a" cx="46" cy="193" r="4" fill="#fbbf24"/>
    <circle class="dot-b" cx="60" cy="193" r="4" fill="#fbbf24"/>
    <circle class="dot-c" cx="74" cy="193" r="4" fill="#fbbf24"/>
  </g>
  <!-- BUBBLE 3: Focus areas (18s → 33s) -->
  <g>
    <animate attributeName="opacity" values="0;0;1;1;0;0" keyTimes="0;0.500;0.533;0.917;0.944;1" dur="36s" repeatCount="indefinite"/>
    <rect x="28" y="176" width="530" height="56" rx="18" fill="#2d2100"/>
    <text class="text" x="48" y="199">Agentic AI · CrewAI · AutoGen · BeeAI</text>
    <text class="text" x="48" y="221">Multi-agent Systems · Tool Use · Orchestration</text>
  </g>

  <!-- ── TYPING 4 (23s → 26s) ── -->
  <g>
    <animate attributeName="opacity" values="0;0;1;1;0;0" keyTimes="0;0.639;0.639;0.722;0.731;1" dur="36s" repeatCount="indefinite"/>
    <rect x="28" y="244" width="72" height="34" rx="17" fill="#1c1500"/>
    <circle class="dot-a" cx="46" cy="261" r="4" fill="#fbbf24"/>
    <circle class="dot-b" cx="60" cy="261" r="4" fill="#fbbf24"/>
    <circle class="dot-c" cx="74" cy="261" r="4" fill="#fbbf24"/>
  </g>
  <!-- BUBBLE 4: ML Engineer (26s → 33s) -->
  <g>
    <animate attributeName="opacity" values="0;0;1;1;0;0" keyTimes="0;0.722;0.756;0.917;0.944;1" dur="36s" repeatCount="indefinite"/>
    <rect x="28" y="244" width="530" height="38" rx="18" fill="#1c1500"/>
    <text class="text" x="48" y="268">ML Engineer at VectorEdge — building practical AI that ships.</text>
  </g>

  <!-- BUBBLE 5: Contact — appears last, stays till reset (29s → 33s) -->
  <g>
    <animate attributeName="opacity" values="0;0;1;1;0;0" keyTimes="0;0.806;0.839;0.917;0.944;1" dur="36s" repeatCount="indefinite"/>
    <rect x="28" y="294" width="560" height="56" rx="18" fill="#1c1500"/>
    <text class="text" x="48" y="318">Let's build something impactful —</text>
    <text class="text" x="48" y="340">reach out at <tspan fill="#fbbf24">dev.karanpreet@gmail.com</tspan></text>
  </g>

</svg>