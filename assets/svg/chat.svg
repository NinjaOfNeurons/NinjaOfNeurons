<svg xmlns="http://www.w3.org/2000/svg" width="620" height="380" viewBox="0 0 620 380">
  <defs>
    <style>
      .text {
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        font-size: 15px;
        fill: #e9d5ff;
      }
      .text-link {
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        font-size: 15px;
        fill: #c084fc;
      }
      .hi {
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        font-size: 22px;
        font-weight: 700;
        fill: #ffffff;
      }

      /* Chat bubble fade-in */
      .b1 { opacity: 0; animation: fadeUp 1.2s ease forwards; animation-delay: 2s; }
      .b2 { opacity: 0; animation: fadeUp 1.2s ease forwards; animation-delay: 6s; }
      .b3 { opacity: 0; animation: fadeUp 1.2s ease forwards; animation-delay: 10s; }
      .b4 { opacity: 0; animation: fadeUp 1.2s ease forwards; animation-delay: 16s; }

      /* Typing indicators */
      .typing1 { opacity: 0; animation: showHide 4s ease forwards; animation-delay: 0.5s; }
      .typing2 { opacity: 0; animation: showHide 4s ease forwards; animation-delay: 4s; }
      .typing3 { opacity: 0; animation: showHide 4s ease forwards; animation-delay: 8s; }
      .typing4 { opacity: 0; animation: showHide 4s ease forwards; animation-delay: 12s; }

      /* Dots bounce */
      .dot1 { animation: bounce 0.8s ease infinite; }
      .dot2 { animation: bounce 0.8s ease infinite; animation-delay: 0.2s; }
      .dot3 { animation: bounce 0.8s ease infinite; animation-delay: 0.4s; }

      @keyframes fadeUp {
        from { opacity: 0; transform: translateY(8px); }
        to   { opacity: 1; transform: translateY(0); }
      }
      @keyframes showHide {
        0%, 90% { opacity: 1; }
        100%    { opacity: 0; }
      }
      @keyframes bounce {
        0%, 100% { transform: translateY(0); }
        50%      { transform: translateY(-3px); }
      }
    </style>
  </defs>

  <!-- Background -->
  <rect width="620" height="380" fill="#0d1117" rx="16"/>

  <!-- Header -->
  <text class="hi" x="28" y="44">Hi there!</text>

  <!-- Typing 1 -->
  <g class="typing1">
    <rect x="28" y="62" width="72" height="34" rx="17" fill="#1e1b2e"/>
    <circle class="dot1" cx="46" cy="79" r="4" fill="#c084fc"/>
    <circle class="dot2" cx="60" cy="79" r="4" fill="#c084fc"/>
    <circle class="dot3" cx="74" cy="79" r="4" fill="#c084fc"/>
  </g>

  <!-- Bubble 1: Intro -->
  <g class="b1">
    <rect x="28" y="62" width="220" height="40" rx="18" fill="#1e1b2e"/>
    <text class="text" x="48" y="87">Hey, glad you stopped by 👋</text>
  </g>

  <!-- Typing 2 -->
  <g class="typing2">
    <rect x="28" y="116" width="72" height="34" rx="17" fill="#1e1b2e"/>
    <circle class="dot1" cx="46" cy="133" r="4" fill="#c084fc"/>
    <circle class="dot2" cx="60" cy="133" r="4" fill="#c084fc"/>
    <circle class="dot3" cx="74" cy="133" r="4" fill="#c084fc"/>
  </g>

  <!-- Bubble 2: Role -->
  <g class="b2">
    <rect x="28" y="116" width="450" height="56" rx="18" fill="#1e1b2e"/>
    <text class="text" x="48" y="139">ML Engineer @ VectorEdge · MSc AI Graduate</text>
    <text class="text" x="48" y="161">Building AI systems from research → production</text>
  </g>

  <!-- Typing 3 -->
  <g class="typing3">
    <rect x="28" y="186" width="72" height="34" rx="17" fill="#1e1b2e"/>
    <circle class="dot1" cx="46" cy="203" r="4" fill="#c084fc"/>
    <circle class="dot2" cx="60" cy="203" r="4" fill="#c084fc"/>
    <circle class="dot3" cx="74" cy="203" r="4" fill="#c084fc"/>
  </g>

  <!-- Bubble 3: Focus areas -->
  <g class="b3">
    <rect x="28" y="186" width="560" height="58" rx="18" fill="#2d1b4e"/>
    <text class="text" x="48" y="210">RAG · Agentic AI · MCP · AI Governance Platform</text>
    <text class="text" x="48" y="232">Model Security · Edge Optimization · Encrypted AI</text>
  </g>

  <!-- Typing 4 -->
  <g class="typing4">
    <rect x="28" y="260" width="72" height="34" rx="17" fill="#1e1b2e"/>
    <circle class="dot1" cx="46" cy="277" r="4" fill="#c084fc"/>
    <circle class="dot2" cx="60" cy="277" r="4" fill="#c084fc"/>
    <circle class="dot3" cx="74" cy="277" r="4" fill="#c084fc"/>
  </g>

  <!-- Bubble 4: Reach out -->
  <g class="b4">
    <rect x="28" y="260" width="560" height="58" rx="18" fill="#1e1b2e"/>
    <text class="text" x="48" y="284">reach out via <tspan fill="#c084fc">linkedin.com/in/karanpreet-5ingh</tspan></text>
    <text class="text" x="48" y="306">or email <tspan fill="#c084fc">dev.karanpreet@gmail.com</tspan></text>
  </g>

</svg>