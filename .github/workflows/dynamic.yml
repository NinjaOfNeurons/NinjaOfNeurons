name: Generate Dynamic SVG

on:
  schedule:
    - cron: "0 6 * * *"   # Runs daily at 6am UTC
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          persist-credentials: false   # IMPORTANT

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Generate dynamic SVG
        run: python generate_dynamic.py

      - name: Commit and push if changed
        env:
          GH_PAT: ${{ secrets.GH_PAT }}
        run: |
          git config --global user.name "Karanpreet Singh"
          git config --global user.email "dev.karanpreet@gmail.com"

          git add assets/svg/dynamic.svg

          if ! git diff --staged --quiet; then
            git commit -m "chore: update dynamic SVG [$(date -u '+%Y-%m-%d %H:%M UTC')]"
            git push https://x-access-token:${GH_PAT}@github.com/NinjaOfNeurons/NinjaOfNeurons.git HEAD:main
          fi
