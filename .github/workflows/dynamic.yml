name: Generate Dynamic SVG

on:
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Generate all SVGs
        run: python generate_dynamic.py

      - name: Commit and push if changed
        env:
          GH_PAT: ${{ secrets.GH_PAT }}
        run: |
          git config --global user.name "auto-bot"
          git config --global user.email "bot@no-reply.local"
          git add assets/svg/dynamic.svg assets/svg/chat.svg assets/svg/scholar.svg README.md
          if ! git diff --staged --quiet; then
            git commit -m "chore: daily theme update [$(date -u '+%Y-%m-%d %H:%M UTC')]"
            git push https://x-access-token:${GH_PAT}@github.com/NinjaOfNeurons/NinjaOfNeurons.git HEAD:main
          fi
